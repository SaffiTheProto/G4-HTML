<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="435.95211" height="370.3499" viewBox="0,0,435.95211,370.3499"><g transform="translate(-10.24542,-32.45968)"><g fill="#000000" stroke="none" stroke-miterlimit="10" font-family="&quot;ITC Garamond Std Light Narrow&quot;, Sans Serif" font-weight="400" font-size="40"><text transform="translate(11.03633,47.52573) scale(0.52349,0.52349)" font-size="40" xml:space="preserve" fill="#000000"><tspan x="0" dy="0">Who is "me" and "i"?</tspan></text><text transform="translate(21.05003,75.91592) scale(0.40361,0.40361)" font-size="40" xml:space="preserve" fill="#000000"><tspan x="0" dy="0">Im SaffiShark, i make weird things.</tspan><tspan x="0" dy="46.150000000000006px">youtube.com/@SaffiShark</tspan></text><text transform="translate(10.80032,135.00327) scale(0.52349,0.52349)" font-size="40" xml:space="preserve" fill="#000000"><tspan x="0" dy="0">Why is the domain "g4.toonpool.xyz"??</tspan></text><text transform="translate(20.81402,163.39346) scale(0.40361,0.40361)" font-size="40" xml:space="preserve" fill="#000000"><tspan x="0" dy="0">I'm hosting this on a website called ToonPool, a website created by me and </tspan><tspan x="0" dy="48px">some other people.</tspan><tspan x="0" dy="48px">You should go look at the rest of the site!</tspan><tspan x="0" dy="48px">https://ToonPool.xyz</tspan></text><text transform="translate(10.56431,256.4654) scale(0.52349,0.52349)" font-size="40" xml:space="preserve" fill="#000000"><tspan x="0" dy="0">Is this open source??</tspan></text><text transform="translate(20.57801,284.8556) scale(0.40361,0.40361)" font-size="40" xml:space="preserve" fill="#000000"><tspan x="0" dy="0">Yes! it has a github page with all the code and assets and such.</tspan><tspan x="0" dy="46.150000000000006px">https://github.com/SaffiTheProto/G4-HTML</tspan></text><text transform="translate(10.82933,348.78208) scale(0.52349,0.52349)" font-size="40" xml:space="preserve" fill="#000000"><tspan x="0" dy="0">Whats the point of this?</tspan></text><text transform="translate(20.84302,377.17228) scale(0.40361,0.40361)" font-size="40" xml:space="preserve" fill="#000000"><tspan x="0" dy="0">Its all just in silly fun. i got bored one day and made this because i researched</tspan><tspan x="0" dy="46.150000000000006px">WAY to far into old OSX UI</tspan></text></g></g></svg>