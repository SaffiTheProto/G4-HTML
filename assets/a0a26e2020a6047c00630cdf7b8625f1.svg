<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="420.74953" height="413.12339" viewBox="0,0,420.74953,413.12339"><g transform="translate(-9.88377,36.71845)"><g stroke="none" stroke-miterlimit="10" font-family="&quot;ITC Garamond Std Light Narrow&quot;, Sans Serif" font-size="40"><text transform="translate(10.70805,40.52517) scale(1.02017,1.02017)" font-size="40" xml:space="preserve" fill="#000000" font-weight="400"><tspan x="0" dy="0">More Info</tspan></text><text transform="translate(11.03633,73.93037) scale(0.52349,0.52349)" font-size="40" xml:space="preserve" fill="#000000" font-weight="400"><tspan x="0" dy="0">What is "G4-HTML"?</tspan></text><text transform="translate(21.05003,102.32056) scale(0.40361,0.40361)" font-size="40" xml:space="preserve" fill="#000000" font-weight="400"><tspan x="0" dy="0">G4-HTML is a fun experiment i made to mess with recreating the feel of an</tspan><tspan x="0" dy="46.150000000000006px">iMac G4 inside of HTML/PenguinMod</tspan></text><text transform="translate(10.80032,161.40791) scale(0.52349,0.52349)" font-size="40" xml:space="preserve" fill="#000000" font-weight="400"><tspan x="0" dy="0">How do i use it?</tspan></text><text transform="translate(20.81402,189.7981) scale(0.40361,0.40361)" font-size="40" xml:space="preserve" fill="#000000" font-weight="400"><tspan x="0" dy="0">Load the webpage, and watch the mac come to life.</tspan></text><text transform="translate(10.56431,230.06075) scale(0.52349,0.52349)" font-size="40" xml:space="preserve" fill="#000000" font-weight="400"><tspan x="0" dy="0">ARGHHHH! why are all the apps are GRAY!?!?!?</tspan></text><text transform="translate(20.57801,258.45095) scale(0.40361,0.40361)" font-size="40" xml:space="preserve" fill="#000000" font-weight="400"><tspan x="0" dy="0">Well for one you shouldnt yell, this is an FAQ lol, its not that serious.</tspan><tspan x="0" dy="46.150000000000006px">and for two, becuase i havent added the rest of the apps</tspan></text><text transform="translate(10.82933,322.37743) scale(0.52349,0.52349)" font-size="40" xml:space="preserve" fill="#000000" font-weight="400"><tspan x="0" dy="0">Wait is this emulated or smth???</tspan></text><text transform="translate(20.84302,350.76763) scale(0.40361,0.40361)" font-size="40" xml:space="preserve" fill="#000000" font-weight="400"><tspan x="0" dy="0">No, as you may have already been able to tell by the weird pixel differences</tspan><tspan x="0" dy="46.150000000000006px">and the fact you cant do much, this isnt a VM, i coded this from scratch.</tspan></text><text transform="translate(51.71757,-28.50444) scale(0.28541,0.28541)" font-size="40" xml:space="preserve" fill-opacity="0.14902" fill="#000000" font-weight="normal"><tspan x="0" dy="0">hi! you can scroll down, btw.</tspan></text></g></g></svg>